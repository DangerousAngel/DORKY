<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DORKY // Advanced Strategy Builder</title>
    <meta name="description" content="A dynamic dork generation suite for targeted intelligence queries.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Light-weight RGB Background Blurs -->
    <div class="floating-bg">
        <div class="rgb-blur-blob blob-red"></div>
        <div class="rgb-blur-blob blob-cyan"></div>
        <div class="rgb-blur-blob blob-purple"></div>
    </div>

    <!-- Center Workspace -->
    <main class="center-container">
        
        <!-- Header Branding & Lang Toggle (AppBar removed) -->
        <div class="brand-floating">
            <div class="brand-section">
                <h1 class="brand-name">DORKY</h1>
            </div>
            <button class="lang-toggle" id="lang-toggle-btn">العربية</button>
        </div>
        
        <!-- Consolidated Dynamic Console Output -->
        <section class="console-card">
            <div class="console-header">
                <div class="console-title">
                    <span class="status-dot"></span>
                    <span id="trans-console-title">Target Search Vector</span>
                </div>
                <div style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-muted);" id="current-engine-label">
                    Engine: Google Search
                </div>
            </div>
            <div class="console-output-wrapper">
                <div class="query-display" id="query-display">Select target options below...</div>
                <div class="action-buttons">
                    <button class="btn btn-secondary btn-icon-only" id="btn-copy" title="Copy Query">
                        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z"/>
                        </svg>
                    </button>
                    <button class="btn btn-primary" id="btn-search">
                        <span id="trans-btn-search">Launch Search</span>
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M14,3V5H17.59L7.76,14.83L9.17,16.24L19,6.41V10H21V3M19,19H5V5H12V3H5C3.89,3 3,3.9 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V12H19V19Z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </section>

        <!-- Dynamic Strategic Wizard Card -->
        <section class="wizard-card">
            
            <!-- Indicators -->
            <div class="wizard-steps-indicator" id="wizard-steps-indicator">
                <div class="progress-line" id="progress-line"></div>
            </div>

            <!-- Steps Container -->
            <div class="wizard-content-wrapper">
                
                <!-- Step content dynamically loaded -->
                <div class="wizard-step active" id="wizard-step-body">
                    <!-- Dynamic Body -->
                </div>

            </div>

            <!-- Footer Controls -->
            <div class="wizard-footer">
                <button class="btn btn-secondary" id="btn-prev" disabled>Back</button>
                <button class="btn btn-primary" id="btn-next">Next</button>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer>
        <span id="trans-footer-by">BUILD BY</span> <a href="https://github.com/DangerousAngel/" target="_blank">DangerousAngel</a>
    </footer>

    <script src="app.js"></script>
</body>
</html>
